<!-- Apply saved theme before first paint (dark is default; no FOUC on light). -->
<script>

    try {
      if (localStorage.getItem('wc26-theme') === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    } catch (e) {}
  })();
</script>
