name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Cloudflare token missing
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' }}
        run: echo '::warning::Skipping deploy until CLOUDFLARE_API_TOKEN is configured.'
      - uses: cloudflare/wrangler-action@v3
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: "4.110.0" # v3.x drops assets.run_worker_first
